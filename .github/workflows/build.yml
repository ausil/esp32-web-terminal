name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: esp32c6
            flash_size: 8MB
          - target: esp32c3
            flash_size: 4MB
    steps:
      - uses: actions/checkout@v4

      - name: Generate TLS certificates
        run: cd certs && ./generate_cert.sh && cd ..

      - name: ESP-IDF build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0
          target: ${{ matrix.target }}

      - name: Rename artifacts
        run: |
          cp build/esp32-web-terminal.bin esp32-web-terminal-${{ matrix.target }}.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: esp32-web-terminal-${{ matrix.target }}.bin

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.bin'
          generate_release_notes: true
